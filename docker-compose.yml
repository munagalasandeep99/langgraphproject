services:
  vector-db:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  # Optional local Neo4j. SKIP this service if you're using a hosted URL
  # (e.g. Neo4j Aura) — just set NEO4J_URI in .env instead.
  # If you use this, put in .env:
  #   NEO4J_URI=bolt://localhost:7687
  #   NEO4J_USERNAME=neo4j
  #   NEO4J_PASSWORD=password123
  graph-db:
    image: neo4j:5
    ports:
      - "7474:7474"   # browser UI at http://localhost:7474
      - "7687:7687"   # bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_storage:
  neo4j_data:
